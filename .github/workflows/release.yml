name: Release Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-frontend-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-push-and-promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_TAG="main-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            sirlazybone/interview-frontend:${{ steps.vars.outputs.image_tag }}
            sirlazybone/interview-frontend:latest

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: Interview-Coach-hse/deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          path: deploy

      - name: Update frontend image tag
        shell: bash
        run: |
          sed -i -E 's|^([[:space:]]*tag:[[:space:]]*).*$|\1'"${{ steps.vars.outputs.image_tag }}"'|' \
            deploy/app/frontend/helm/values.yaml

      - name: Commit and push deploy repo
        shell: bash
        run: |
          cd deploy
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/frontend/helm/values.yaml
          git diff --cached --quiet && exit 0
          git commit -m "ci: deploy frontend ${{ steps.vars.outputs.image_tag }}"
          git push
